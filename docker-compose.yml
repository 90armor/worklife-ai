services:
  db:
    image: pgvector/pgvector:pg16
    container_name: app_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-worklifeai}
      POSTGRES_USER: ${DB_USERNAME:-90armor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-90armor} -d ${DB_DATABASE:-worklifeai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: app_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/var/www/html/app
      - ./backend/routes:/var/www/html/routes
      - ./backend/config:/var/www/html/config
      - ./backend/database:/var/www/html/database
      - ./backend/public:/var/www/html/public
      - ./backend/bootstrap/app.php:/var/www/html/bootstrap/app.php
      - ./backend/bootstrap/cache:/var/www/html/bootstrap/cache
      - ./backend/storage:/var/www/html/storage
      - ./backend/.env:/var/www/html/.env
    command: php -S 0.0.0.0:8000 -t public
    # Useful one-off commands (run with: docker exec app_backend <cmd>):
    #   docker exec app_backend php artisan migrate --seed
    #   docker exec app_backend php artisan migrate
    #   docker exec app_backend php artisan db:seed
    #   docker exec app_backend php artisan migrate --seed --force

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: app_frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
